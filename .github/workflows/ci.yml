name: CI

on:
  pull_request:
  push:

jobs:
  validate:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: uv sync --dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run ty check src
      - run: uv run pytest -q
      - run: uv build
      - run: uv run python scripts/check_package_contents.py
      - run: uv run python scripts/check_generated_code.py
      - run: uv run python scripts/check_residue.py
      - run: uv run python scripts/check_docs_links.py
      - run: uv run python scripts/check_operator_docs.py
      - run: uv run python scripts/check_context_pack.py
